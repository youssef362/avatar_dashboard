<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Issue Dashboard</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --line:#262b36; --text:#e7eaf0; --muted:#9aa4b2;
    --accent:#4f8cff; --ok:#39d98a; --warn:#f4b740; --err:#ff6b6b; --chip:#0f1218;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--text);padding:24px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  h1{margin:0;font-size:20px}
  .newbtn{background:var(--accent);color:#fff;text-decoration:none;padding:9px 14px;border-radius:9px;font-size:14px;font-weight:600}
  a.newbtn{background:var(--accent);color:#fff;text-decoration:none;padding:9px 14px;border-radius:9px;font-size:14px;font-weight:600}
  .expbtn{background:var(--card);border:1px solid var(--line);color:var(--text);padding:9px 14px;border-radius:9px;
    font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .expbtn:hover{border-color:var(--ok);color:var(--ok)}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:96px}
  .stat .n{font-size:22px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--muted);padding:8px 13px;font-size:13px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  input.search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:9px 12px;font-size:14px}
  input.search:focus{outline:none;border-color:var(--accent)}
  .wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;user-select:none}
  th:hover{color:var(--text)}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:rgba(79,140,255,.07)}
  td.title{white-space:normal;min-width:240px;font-weight:600}
  tr:last-child td{border-bottom:0}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;background:var(--chip);border:1px solid var(--line)}
  .chip.Bug{color:#ff9d9d;border-color:#5a2b2b}
  .chip.Task{color:#9fe3c0;border-color:#2b5a45}
  .chip.Case{color:#a9c6ff;border-color:#2b3f5a}
  .clip{color:var(--muted);font-size:12px;margin-left:6px}
  .st{font-size:12px;font-weight:600}
  .st.open{color:var(--ok)} .st.closed{color:var(--muted)}
  .due.overdue{color:var(--err);font-weight:600}
  .due.soon{color:var(--warn)}
  .empty,.loading{padding:40px;text-align:center;color:var(--muted)}
  .muted{color:var(--muted)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.show{display:flex}
  .modal-card{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:600px;width:100%;
    max-height:88vh;overflow-y:auto;padding:24px}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .modal h2{margin:6px 0 0;font-size:18px}
  .close{background:none;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin:16px 0;font-size:13px}
  .meta .k{color:var(--muted)}
  .desc{background:#0f1218;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;
    white-space:pre-wrap;line-height:1.5;margin-bottom:16px}
  .att h4{margin:0 0 8px;font-size:13px;color:var(--muted)}
  .att img{max-width:100%;border-radius:10px;border:1px solid var(--line);display:block;margin-bottom:10px}
  .att audio{width:100%;margin-bottom:10px}
  .att a{color:var(--accent);font-size:13px;text-decoration:none}
  .ghbtn{display:inline-block;margin-top:8px;background:var(--accent);color:#fff;text-decoration:none;
    padding:9px 14px;border-radius:9px;font-size:14px;font-weight:600}
  .disc{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .disc h4{margin:0 0 10px;font-size:14px}
  .cmt{background:#0f1218;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .cmt-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;gap:10px}
  .cmt-author{font-weight:600;color:var(--accent)}
  .cmt-time{color:var(--muted);white-space:nowrap}
  .cmt-body{font-size:13px;white-space:pre-wrap;line-height:1.45}
  .composer{margin-top:10px}
  .composer select,.composer textarea{width:100%;background:#0f1218;border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;margin-bottom:8px}
  .composer select{width:auto}
  .composer textarea{min-height:60px;resize:vertical}
  .composer select:focus,.composer textarea:focus{outline:none;border-color:var(--accent)}
  .composer button{margin:0;background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 16px;
    font-size:13px;font-weight:600;cursor:pointer;width:auto}
  .composer button:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
  <div id="loginGate" style="display:none;max-width:340px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px">
    <h1 style="margin:0 0 4px;font-size:20px">Sign in</h1>
    <p style="margin:0 0 18px;color:var(--muted);font-size:13px">Enter the username and password you were given.</p>
    <label style="display:block;font-size:13px;color:var(--muted);margin:0 0 6px">Username</label>
    <input id="lgUser" autocomplete="username" style="width:100%;background:#0f1218;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:14px;margin-bottom:12px" />
    <label style="display:block;font-size:13px;color:var(--muted);margin:0 0 6px">Password</label>
    <input id="lgPass" type="password" autocomplete="current-password" style="width:100%;background:#0f1218;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:14px" />
    <button id="lgBtn" style="width:100%;margin-top:18px;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer">Sign in</button>
    <div id="lgMsg" style="margin-top:12px;font-size:13px;color:var(--err)"></div>
  </div>

  <div id="appMain" style="display:none">
  <header>
    <h1>🐞 Issue Dashboard</h1>
    <a class="newbtn" href="/">+ New report</a>
  </header>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="seg" id="stateSeg">
      <button data-v="all" class="active">All</button>
      <button data-v="open">Open</button>
      <button data-v="closed">Closed</button>
    </div>
    <div class="seg" id="typeSeg">
      <button data-v="all" class="active">All types</button>
      <button data-v="Bug">Bugs</button>
      <button data-v="Task">Tasks</button>
      <button data-v="Case">Cases</button>
    </div>
    <input class="search" id="search" placeholder="Search title, reporter, assignee…" />
    <button class="expbtn" id="exportBtn">⬇ Export to Excel</button>
  </div>

  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th data-k="number">#</th>
          <th data-k="type">Type</th>
          <th data-k="title">Title</th>
          <th data-k="reporter">Reporter</th>
          <th data-k="assignee">Assignee</th>
          <th data-k="deadline">Deadline</th>
          <th data-k="state">Status</th>
          <th data-k="created_at">Created</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="8" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card" id="modalCard"></div>
  </div>
  </div><!-- /appMain -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let DATA = [];
  let VIEW = [];
  const PEOPLE = ["Mohamed", "Kazbek", "Sergei", "Berg"];
  let stateFilter="all", typeFilter="all", q="";
  let sortKey="created_at", sortDir=-1;
  const el=(id)=>document.getElementById(id);
  const now=Date.now();

  const TOKEN_KEY="ir_token", NAME_KEY="ir_name";
  let AUTH_REQUIRED=false, ME="";
  const getToken=()=>localStorage.getItem(TOKEN_KEY)||"";
  const authHeaders=()=>{ const t=getToken(); return t?{Authorization:"Bearer "+t}:{}; };
  function showGate(show){ el("loginGate").style.display=show?"block":"none"; el("appMain").style.display=show?"none":"block"; }
  async function apiFetch(url, opts={}){
    const headers=Object.assign({}, opts.headers||{}, authHeaders());
    const res=await fetch(url,{...opts, headers});
    if(res.status===401){ localStorage.removeItem(TOKEN_KEY); showGate(true); throw new Error("Session expired — please sign in again."); }
    return res;
  }

  async function load(){
    try{
      const res=await apiFetch("/api/issues");
      const d=await res.json();
      if(!res.ok) throw new Error(d.error||"Failed to load");
      DATA=d.items; render();
    }catch(e){ el("rows").innerHTML=`<tr><td colspan="8" class="empty">${e.message}</td></tr>`; }
  }

  const esc=(s="")=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const fmtDate=(s)=>{ if(!s) return ""; return new Date(s).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); };
  const fmtFull=(s)=>{ if(!s) return "—"; return new Date(s).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}); };

  // Google Drive helpers — turn a share URL into an embeddable preview
  const driveId=(u="")=>{ const m=u.match(/[-\w]{25,}/); return m?m[0]:null; };
  const driveThumb=(u,w=1000)=>{ const id=driveId(u); return id?`https://drive.google.com/thumbnail?id=${id}&sz=w${w}`:u; };
  const driveStream=(u)=>{ const id=driveId(u); return id?`https://drive.google.com/uc?export=download&id=${id}`:u; };

  function dueCell(item){
    if(!item.deadline) return '<span class="muted">—</span>';
    const t=new Date(item.deadline).getTime();
    const overdue=item.state==="open"&&t<now;
    const soon=item.state==="open"&&!overdue&&(t-now)<2*864e5;
    const cls=overdue?"overdue":soon?"soon":"";
    return `<span class="due ${cls}">${fmtDate(item.deadline)}${overdue?" ⚠":""}</span>`;
  }

  function stats(list){
    const open=list.filter(i=>i.state==="open").length;
    const closed=list.filter(i=>i.state==="closed").length;
    const overdue=list.filter(i=>i.state==="open"&&i.deadline&&new Date(i.deadline).getTime()<now).length;
    el("stats").innerHTML=`
      <div class="stat"><div class="n">${list.length}</div><div class="l">Total</div></div>
      <div class="stat"><div class="n" style="color:var(--ok)">${open}</div><div class="l">Open</div></div>
      <div class="stat"><div class="n" style="color:var(--muted)">${closed}</div><div class="l">Closed</div></div>
      <div class="stat"><div class="n" style="color:var(--err)">${overdue}</div><div class="l">Overdue</div></div>`;
  }

  function render(){
    stats(DATA);
    let list=DATA.filter(i=>{
      if(stateFilter!=="all"&&i.state!==stateFilter) return false;
      if(typeFilter!=="all"&&i.type!==typeFilter) return false;
      if(q){ const hay=(i.title+" "+i.reporter+" "+i.assignee).toLowerCase(); if(!hay.includes(q.toLowerCase())) return false; }
      return true;
    });
    list.sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==="created_at"||sortKey==="deadline"){ x=x?new Date(x).getTime():0; y=y?new Date(y).getTime():0; }
      if(typeof x==="string"){ x=x.toLowerCase(); y=(y||"").toLowerCase(); }
      return x<y?-1*sortDir:x>y?1*sortDir:0;
    });
    VIEW = list;
    if(list.length===0){ el("rows").innerHTML=`<tr><td colspan="8" class="empty">No issues match.</td></tr>`; return; }
    el("rows").innerHTML=list.map(i=>{
      const clip=(i.attachments&&i.attachments.length?`<span class="clip">📎${i.attachments.length}</span>`:"")
              + (i.comments?`<span class="clip">💬${i.comments}</span>`:"");
      return `<tr data-n="${i.number}">
        <td class="muted">#${i.number}</td>
        <td><span class="chip ${i.type}">${esc(i.type)}</span></td>
        <td class="title">${esc(i.title)}${clip}</td>
        <td>${esc(i.reporter)||'<span class="muted">—</span>'}</td>
        <td>${esc(i.assignee)||'<span class="muted">—</span>'}</td>
        <td>${dueCell(i)}</td>
        <td><span class="st ${i.state}">${i.state==="open"?"● Open":"✓ Closed"}</span></td>
        <td class="muted">${fmtDate(i.created_at)}</td>
      </tr>`;
    }).join("");
    document.querySelectorAll("tbody tr[data-n]").forEach(tr=>{
      tr.addEventListener("click",()=>openModal(Number(tr.dataset.n)));
    });
  }

  function openModal(num){
    const i=DATA.find(x=>x.number===num); if(!i) return;
    let att="";
    if(i.attachments&&i.attachments.length){
      att='<div class="att"><h4>Attachments</h4>';
      for(const a of i.attachments){
        if(a.type==="image"){
          att+=`<a href="${a.url}" target="_blank"><img src="${driveThumb(a.url)}" alt="${esc(a.name)}" onerror="this.style.display='none'"></a>`;
          att+=`<a href="${a.url}" target="_blank">Open image ↗</a><br>`;
        }else if(a.type==="voice"){
          att+=`<audio controls src="${driveStream(a.url)}"></audio>`;
          att+=`<a href="${a.url}" target="_blank">Open audio ↗</a><br>`;
        }else{
          att+=`<a href="${a.url}" target="_blank">📄 ${esc(a.name||"log file")} — open ↗</a><br>`;
        }
      }
      att+="</div>";
    }
    el("modalCard").innerHTML=`
      <div class="modal-head">
        <div>
          <span class="chip ${i.type}">${esc(i.type)}</span>
          <span class="st ${i.state}" style="margin-left:8px">${i.state==="open"?"● Open":"✓ Closed"}</span>
          <h2>${esc(i.title)}</h2>
        </div>
        <button class="close" id="closeBtn">&times;</button>
      </div>
      <div class="meta">
        <div><div class="k">Reporter</div>${esc(i.reporter)||"—"}</div>
        <div><div class="k">Assignee</div>${esc(i.assignee)||"—"}</div>
        <div><div class="k">Deadline</div>${i.deadline?fmtFull(i.deadline):"—"}</div>
        <div><div class="k">Created</div>${fmtFull(i.created_at)}</div>
      </div>
      ${i.description?`<div class="desc">${esc(i.description)}</div>`:""}
      ${att}
      <div class="disc" id="discWrap"><div class="muted" style="font-size:13px">Loading discussion…</div></div>
      <a class="ghbtn" href="${i.url}" target="_blank">Open in GitHub ↗</a>`;
    el("modal").classList.add("show");
    el("closeBtn").addEventListener("click",closeModal);
    loadComments(i.number);
  }

  async function loadComments(num){
    const wrap=el("discWrap"); if(!wrap) return;
    try{
      const res=await apiFetch(`/api/comments?number=${num}`);
      const d=await res.json();
      if(!res.ok) throw new Error(d.error||"Failed to load");
      renderDiscussion(num, d.comments||[]);
    }catch(e){
      wrap.innerHTML=`<h4>Discussion</h4><div class="muted" style="font-size:13px">Couldn't load: ${esc(e.message)}</div>`;
    }
  }

  function renderDiscussion(num, comments){
    const wrap=el("discWrap");
    const list=comments.length
      ? comments.map(c=>`<div class="cmt"><div class="cmt-head"><span class="cmt-author">${esc(c.author)}</span><span class="cmt-time">${fmtFull(c.created_at)}</span></div><div class="cmt-body">${esc(c.body)}</div></div>`).join("")
      : `<div class="muted" style="font-size:13px;margin-bottom:8px">No comments yet — start the discussion.</div>`;
    const opts=PEOPLE.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join("");
    const authorBlock = AUTH_REQUIRED
      ? `<div class="muted" style="font-size:12px;margin-bottom:6px">Commenting as <b style="color:var(--accent)">${esc(ME)}</b></div>`
      : `<select id="cAuthor"><option value="">Your name…</option>${opts}</select>`;
    wrap.innerHTML=`<h4>Discussion</h4><div class="cmt-list">${list}</div>
      <div class="composer">
        ${authorBlock}
        <div style="display:flex;gap:8px;align-items:center;margin:2px 0 8px">
          <button type="button" id="cAttach" style="margin:0;width:auto;background:#0f1218;border:1px solid var(--line);color:var(--muted);padding:7px 11px;font-size:12px;border-radius:8px;font-weight:400">📎 Attach log</button>
          <span id="cAttachStatus" style="font-size:12px;color:var(--muted)"></span>
          <input type="file" id="cFile" style="display:none" accept=".log,.txt,.json,.csv,.xml,.yml,.yaml,.zip,.gz,text/*" />
        </div>
        <textarea id="cBody" placeholder="Write a comment — or drop a log file here"></textarea>
        <button id="cPost">Post comment</button>
      </div>`;

    // attach-log wiring
    async function handleLog(file){
      if(!file) return;
      if(file.size>8*1024*1024){ alert("File too large (max 8 MB)."); return; }
      const st=el("cAttachStatus"); st.textContent="Uploading…";
      try{
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
        const res=await apiFetch("/api/upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({filename:file.name,mimeType:file.type||"application/octet-stream",dataBase64:base64})});
        if(res.status===501) throw new Error("Drive uploads aren't configured yet.");
        const d=await res.json(); if(!res.ok) throw new Error(d.error||"Upload failed");
        const ta=el("cBody"); ta.value=(ta.value?ta.value+"\n":"")+`📄 ${file.name}: ${d.url}`;
        st.textContent="Attached ✔";
      }catch(e){ st.textContent=""; alert(e.message); }
    }
    el("cAttach").addEventListener("click",()=>el("cFile").click());
    el("cFile").addEventListener("change",()=>handleLog(el("cFile").files[0]));
    const ta=el("cBody");
    ["dragenter","dragover"].forEach(ev=>ta.addEventListener(ev,e=>{e.preventDefault();ta.style.borderColor="var(--accent)";}));
    ["dragleave","drop"].forEach(ev=>ta.addEventListener(ev,e=>{e.preventDefault();ta.style.borderColor="";}));
    ta.addEventListener("drop",e=>{ if(e.dataTransfer.files[0]) handleLog(e.dataTransfer.files[0]); });
    el("cPost").addEventListener("click", async ()=>{
      const author = AUTH_REQUIRED ? ME : el("cAuthor").value;
      const body=el("cBody").value.trim();
      if(!author){ alert("Pick your name first."); return; }
      if(!body){ alert("Write something first."); return; }
      const b=el("cPost"); b.disabled=true; b.textContent="Posting…";
      try{
        const res=await apiFetch("/api/comments",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:num, author, body})});
        const d=await res.json(); if(!res.ok) throw new Error(d.error||"Failed to post");
        await loadComments(num);
      }catch(e){ alert(e.message); b.disabled=false; b.textContent="Post comment"; }
    });
  }
  function closeModal(){ el("modal").classList.remove("show"); }
  el("modal").addEventListener("click",e=>{ if(e.target===el("modal")) closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

  function seg(id,set){
    el(id).querySelectorAll("button").forEach(b=>{
      b.addEventListener("click",()=>{
        el(id).querySelectorAll("button").forEach(x=>x.classList.remove("active"));
        b.classList.add("active"); set(b.dataset.v); render();
      });
    });
  }
  seg("stateSeg",v=>stateFilter=v);
  seg("typeSeg",v=>typeFilter=v);
  el("search").addEventListener("input",e=>{ q=e.target.value; render(); });

  function exportExcel(){
    if(typeof XLSX==="undefined"){ alert("Excel library still loading — try again in a second."); return; }
    const rows = VIEW.map(i=>({
      "#": i.number,
      Type: i.type,
      Title: i.title,
      Reporter: i.reporter,
      Assignee: i.assignee,
      Deadline: i.deadline ? new Date(i.deadline).toLocaleString() : "",
      Status: i.state,
      Created: new Date(i.created_at).toLocaleString(),
      Description: i.description || "",
      Attachments: (i.attachments||[]).map(a=>a.url).join(", "),
      Link: i.url,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{wch:5},{wch:8},{wch:40},{wch:12},{wch:12},{wch:20},{wch:8},{wch:20},{wch:50},{wch:40},{wch:45}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Issues");
    XLSX.writeFile(wb, `issues-${new Date().toISOString().slice(0,10)}.xlsx`);
  }
  el("exportBtn").addEventListener("click", exportExcel);
  document.querySelectorAll("th").forEach(th=>{
    th.addEventListener("click",()=>{ const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=1;} render(); });
  });

  el("lgBtn").addEventListener("click", doLogin);
  el("lgPass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
  async function doLogin(){
    const u=el("lgUser").value.trim(), p=el("lgPass").value;
    if(!u||!p){ el("lgMsg").textContent="Enter username and password."; return; }
    el("lgBtn").disabled=true; el("lgBtn").textContent="Signing in…";
    try{
      const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
      const d=await res.json(); if(!res.ok) throw new Error(d.error||"Login failed");
      localStorage.setItem(TOKEN_KEY,d.token); localStorage.setItem(NAME_KEY,d.name); ME=d.name;
      el("lgMsg").textContent=""; showGate(false); startApp();
    }catch(e){ el("lgMsg").textContent=e.message; }
    finally{ el("lgBtn").disabled=false; el("lgBtn").textContent="Sign in"; }
  }
  let started=false;
  function startApp(){ if(started) return; started=true; load(); setInterval(load,60000); }
  async function boot(){
    let cfg={authRequired:false};
    try{ cfg=await fetch("/api/config").then(r=>r.json()); }catch{}
    AUTH_REQUIRED=!!cfg.authRequired;
    ME=localStorage.getItem(NAME_KEY)||"";
    if(AUTH_REQUIRED && !getToken()){ showGate(true); return; }
    showGate(false); startApp();
  }
  boot();
</script>
</body>
</html>
